# ============================================================
# Fluxion – Docker Compose Override for Production
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up
# ============================================================

services:
  db:
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    ports: [] # Do not expose DB port in production

  redis:
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 60 1
    ports: [] # Do not expose Redis port in production

  api:
    environment:
      ENVIRONMENT: production
      DEBUG: "false"
      DATABASE_URL: postgresql+asyncpg://fluxion:${POSTGRES_PASSWORD}@db:5432/fluxion
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    command: >
      gunicorn app.main:app
      --worker-class uvicorn.workers.UvicornWorker
      --workers 4
      --bind 0.0.0.0:8000
      --timeout 120
      --keepalive 5
      --max-requests 1000
      --max-requests-jitter 100
      --access-logfile /app/logs/access.log
      --error-logfile /app/logs/error.log
      --log-level info
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M
    restart: always

  worker:
    environment:
      ENVIRONMENT: production
      DATABASE_URL: postgresql+asyncpg://fluxion:${POSTGRES_PASSWORD}@db:5432/fluxion
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
    restart: always
