---
appName: fluxion
environment: prod

backend:
  replicas: 5
  image:
    repository: registry.example.com/app/backend
    tag: v1.0.0
    pullPolicy: Always
  containerPort: 3000
  servicePort: 80
  resources:
    limits:
      cpu: 2000m
      memory: 2Gi
    requests:
      cpu: 1000m
      memory: 1Gi

frontend:
  replicas: 5
  image:
    repository: registry.example.com/app/frontend
    tag: v1.0.0
    pullPolicy: Always
  containerPort: 80
  servicePort: 80
  apiUrl: /api
  service:
    type: ClusterIP
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 500m
      memory: 512Mi

database:
  replicas: 1
  image:
    repository: mysql
    tag: "8.0"
    pullPolicy: IfNotPresent
  containerPort: 3306
  servicePort: 3306
  name: fluxiondb
  user: appuser
  # passwords sourced from Kubernetes Secrets / ExternalSecrets, NOT stored here
  storageClass: premium-rwo
  storage: 50Gi
  resources:
    limits:
      cpu: 4000m
      memory: 8Gi
    requests:
      cpu: 2000m
      memory: 4Gi

redis:
  replicas: 1
  image:
    repository: redis
    tag: "7-alpine"
    pullPolicy: IfNotPresent
  containerPort: 6379
  servicePort: 6379
  storageClass: premium-rwo
  storage: 20Gi
  resources:
    limits:
      cpu: 1000m
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 1Gi

ingress:
  host: fluxion.example.com
  class: nginx
  sslRedirect: "true"
  certManager:
    issuer: letsencrypt-prod

logLevel: warn
imagePullSecrets: regcred
