---
appName: fluxion
environment: staging

backend:
  replicas: 2
  image:
    repository: registry.example.com/app/backend
    tag: staging
    pullPolicy: Always
  containerPort: 3000
  servicePort: 80
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 500m
      memory: 512Mi

frontend:
  replicas: 2
  image:
    repository: registry.example.com/app/frontend
    tag: staging
    pullPolicy: Always
  containerPort: 80
  servicePort: 80
  apiUrl: /api
  service:
    type: ClusterIP
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 200m
      memory: 256Mi

database:
  replicas: 1
  image:
    repository: mysql
    tag: "8.0"
    pullPolicy: IfNotPresent
  containerPort: 3306
  servicePort: 3306
  name: fluxiondb
  user: appuser
  storageClass: standard
  storage: 20Gi
  resources:
    limits:
      cpu: 1000m
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 1Gi

redis:
  replicas: 1
  image:
    repository: redis
    tag: "7-alpine"
    pullPolicy: IfNotPresent
  containerPort: 6379
  servicePort: 6379
  storageClass: standard
  storage: 10Gi
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 200m
      memory: 512Mi

ingress:
  host: staging.fluxion.example.com
  class: nginx
  sslRedirect: "true"
  certManager:
    issuer: letsencrypt-staging

logLevel: info
imagePullSecrets: regcred
