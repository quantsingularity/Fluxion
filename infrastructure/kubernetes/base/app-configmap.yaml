---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fluxion-config
  namespace: default
  labels:
    app: fluxion
    component: config
data:
  API_URL: http://fluxion-backend
  REDIS_HOST: fluxion-redis
  REDIS_PORT: "6379"
  DATABASE_HOST: fluxion-database
  DATABASE_PORT: "3306"
  DATABASE_NAME: fluxiondb
  DATABASE_USER: appuser
  LOG_LEVEL: info
  NODE_ENV: production
  ENABLE_AUDIT_LOGGING: "true"
  ENABLE_RATE_LIMITING: "true"
