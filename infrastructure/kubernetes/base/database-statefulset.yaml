---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: fluxion-database
  namespace: default
  labels:
    app: fluxion-database
    component: database
    tier: data
spec:
  serviceName: fluxion-database
  replicas: 1
  selector:
    matchLabels:
      app: fluxion-database
  template:
    metadata:
      labels:
        app: fluxion-database
        component: database
        tier: data
    spec:
      serviceAccountName: fluxion-database-sa
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
      terminationGracePeriodSeconds: 60
      containers:
        - name: fluxion-database
          image: mysql:8.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: mysql
              containerPort: 3306
              protocol: TCP
          resources:
            limits:
              cpu: 1000m
              memory: 1Gi
            requests:
              cpu: 500m
              memory: 512Mi
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: fluxion-secrets
                  key: mysql-root-password
            - name: MYSQL_DATABASE
              value: fluxiondb
            - name: MYSQL_USER
              value: appuser
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: fluxion-secrets
                  key: mysql-password
          volumeMounts:
            - name: fluxion-database-data
              mountPath: /var/lib/mysql
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - |
                  mysqladmin ping -u root -p"${MYSQL_ROOT_PASSWORD}" --silent
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - |
                  mysql -u root -p"${MYSQL_ROOT_PASSWORD}" -e "SELECT 1" --silent 2>/dev/null
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - |
                  mysqladmin ping -u root -p"${MYSQL_ROOT_PASSWORD}" --silent
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
      volumes:
        - name: tmp
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: fluxion-database-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: standard
        resources:
          requests:
            storage: 10Gi
