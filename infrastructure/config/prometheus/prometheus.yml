global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: fluxion
    env: production

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: fluxion-api
    static_configs:
      - targets: ["api:9090"]
    metrics_path: /metrics
    scheme: http

  - job_name: fluxion-ml
    static_configs:
      - targets: ["ml-service:9091"]
    metrics_path: /metrics
    scheme: http

  - job_name: redis
    static_configs:
      - targets: ["redis:6379"]

  - job_name: elasticsearch
    static_configs:
      - targets: ["elasticsearch:9200"]
    metrics_path: /_prometheus/metrics
    scheme: http
    basic_auth:
      username: elastic
      password_file: /etc/prometheus/elastic_password

  - job_name: docker-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 30s
    relabel_configs:
      - source_labels: [__meta_docker_container_label_prometheus_io_scrape]
        action: keep
        regex: "true"
      - source_labels: [__meta_docker_container_label_prometheus_io_port]
        action: replace
        target_label: __address__
        regex: (.+)
        replacement: ${1}
