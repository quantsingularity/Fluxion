[defaults]
# Roles live in ansible/roles, but the playbook is in ansible/playbooks, so
# Ansible's default lookup (playbooks/roles) misses them. Point roles_path at
# the real location so `ansible-playbook playbooks/main.yml` and `ansible-lint`
# resolve the common/security/webserver/database roles.
roles_path = roles
inventory = inventory/hosts.yml
host_key_checking = True
retry_files_enabled = False
stdout_callback = yaml
interpreter_python = auto_silent

[privilege_escalation]
become = False

[ssh_connection]
pipelining = True
