---
# main.yml - Main playbook that includes all other playbooks
- name: Apply security hardening to all hosts
  hosts: all
  become: true
  roles:
    - common
    - security

- name: Configure web servers
  hosts: webservers
  become: true
  roles:
    - webserver

- name: Configure database servers
  hosts: databases
  become: true
  roles:
    - database
